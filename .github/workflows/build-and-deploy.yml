name: Build source repo and deploy to Pages

on:
  schedule:
    # every 15 minutes - polls the upstream (read-only, public) repo for changes
    - cron: '*/15 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  SOURCE_REPO: Ale6699/PadelsLeague
  SOURCE_REF: main
  CUSTOM_DOMAIN: padel.sagliettiluca.it

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout upstream source (public, read-only)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_REF }}
          path: source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source/baraonda-padel/package-lock.json

      - name: Install dependencies
        working-directory: source/baraonda-padel
        # The upstream package-lock.json has "resolved" URLs pointing at an
        # internal proxy host (applied-caas-gateway1.internal.api.openai.org)
        # instead of the public npm registry -- an artifact of whatever
        # sandboxed environment last regenerated that lock file. Those URLs
        # are unreachable from here (older npm hung for minutes retrying them
        # before crashing; newer npm fails fast with EALLOWREMOTE). Dropping
        # the lock file lets npm resolve everything fresh from the real
        # public registry instead.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Run tests
        working-directory: source/baraonda-padel
        run: npm test

      - name: Build (served from domain root, not a /repo/ subpath)
        working-directory: source/baraonda-padel
        env:
          VITE_DATA_PROVIDER: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npx vite build --base=/

      - name: Add custom domain CNAME
        run: echo "${{ env.CUSTOM_DOMAIN }}" > source/baraonda-padel/dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: source/baraonda-padel/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
