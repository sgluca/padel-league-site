name: Build source repo and deploy to Pages

on:
  schedule:
    # every 15 minutes - polls the upstream (read-only, public) repo for changes
    - cron: '*/15 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  SOURCE_REPO: Ale6699/PadelsLeague
  SOURCE_REF: main
  CUSTOM_DOMAIN: padel.sagliettiluca.it

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout upstream source (public, read-only)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_REF }}
          path: source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source/baraonda-padel/package-lock.json

      - name: Install dependencies
        working-directory: source/baraonda-padel
        # npm ci (not install): the upstream lock file is in sync with package.json,
        # and ci is faster/deterministic. --no-audit/--no-fund skip the extra
        # registry calls that are the known trigger for npm's "Exit handler
        # never called!" bug (silent multi-minute hang on hosted runners).
        # Retries + short fetch timeouts are a backstop for any remaining flakiness.
        run: |
          npm config set fetch-timeout 60000
          npm config set fetch-retry-mintimeout 5000
          npm config set fetch-retry-maxtimeout 20000
          n=0
          until npm ci --no-audit --no-fund; do
            n=$((n + 1))
            if [ "$n" -ge 3 ]; then
              echo "npm ci failed after $n attempts" >&2
              exit 1
            fi
            echo "npm ci failed, retrying in 10s (attempt $n)..."
            sleep 10
          done

      - name: Run tests
        working-directory: source/baraonda-padel
        run: npm test

      - name: Build (served from domain root, not a /repo/ subpath)
        working-directory: source/baraonda-padel
        env:
          VITE_DATA_PROVIDER: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npx vite build --base=/

      - name: Add custom domain CNAME
        run: echo "${{ env.CUSTOM_DOMAIN }}" > source/baraonda-padel/dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: source/baraonda-padel/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
